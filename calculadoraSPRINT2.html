<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de prevenção</title>
</head>
<body>
    Informe a área total (em m²) da sua plantação: 
<input type="number" id="ipt_area">
<br>
<br>
<input type="radio" name="plano" value="economico">Econômico
<input type="radio" name="plano" value="recomendado"> Recomendado
<input type="radio" name="plano" value="premium"> Premium
<br>
<br>
<button onclick="calcular()">Calcular Investimento</button>

<div id="resultado"></div>
<div id="resultado2"></div>

<script>

function calcular() {
    
    

    let area = Number(ipt_area.value);
    let sensores = area / 314;

    if (sensores < 1) {
        sensores = 1;
    }

    sensores = Number(sensores.toFixed(0));

    let preco = 0;

    if (eco.checked) {
        preco = 135;
    } 
    else if (rec.checked) {
        preco = 165;
    } 
    else if (pre.checked) {
        preco = 200;
    } 
    else {
        resultado.innerHTML = "Escolha um plano!";
        return;
    }

    let total = sensores * preco;

    resultado.innerHTML = `Sensores: ${sensores}`;
    resultado2.innerHTML = `Total: R$ ${total.toFixed(2)}`;
}

</script>
    
    
</body>
</html>
